name: Generate Contribution Snake

on:
  schedule:
    # Twice daily
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-snake:
    name: Render contribution snake animation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate snake SVG and GIF
        uses: Platane/snk@v3
        with:
          github_user_name: Shriyansh2004
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#00d4aa&palette=github-dark
            dist/github-contribution-grid-snake.gif?color_snake=#00d4aa&palette=github-dark

      - name: Push snake assets to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          commit_message: "?? update contribution snake"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
