name: Generate Contribution Snake

on:
  schedule:
    # Twice daily
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-snake:
    name: Render contribution snake SVG
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate snake animation
        uses: Platane/snk@v3
        with:
          github_user_name: Shriyansh2004
          outputs: assets/github-contribution-grid-snake.svg
          snake_color: "00d4aa"
          dist_plays_on_load: true

      - name: Commit snake asset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-contribution-grid-snake.svg
          if git diff --staged --quiet; then
            echo "Snake SVG unchanged."
            exit 0
          fi
          git commit -m "?? update contribution snake"
          git push
