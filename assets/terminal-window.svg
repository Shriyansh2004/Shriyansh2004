<svg xmlns="http://www.w3.org/2000/svg" width="820" height="292" viewBox="0 0 820 292" role="img" aria-label="animated macOS terminal boot sequence">
  <defs>
    <linearGradient id="titleBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d333b"/>
      <stop offset="100%" stop-color="#22272e"/>
    </linearGradient>
    <clipPath id="shell">
      <rect width="820" height="292" rx="14" ry="14"/>
    </clipPath>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g clip-path="url(#shell)">
    <rect width="820" height="292" fill="#0d1117"/>
    <rect width="820" height="292" fill="none" stroke="#30363d" stroke-width="1"/>

    <!-- Title bar -->
    <rect width="820" height="50" fill="url(#titleBar)"/>
    <rect width="820" height="50" fill="url(#titleBar)" opacity="0.35">
      <animate attributeName="opacity" values="0.15;0.45;0.15" dur="4s" repeatCount="indefinite"/>
    </rect>
    <line x1="0" y1="50" x2="820" y2="50" stroke="#30363d"/>

    <circle cx="26" cy="25" r="7" fill="#ff5f57"/>
    <circle cx="50" cy="25" r="7" fill="#febc2e"/>
    <circle cx="74" cy="25" r="7" fill="#28c840" filter="url(#glow)">
      <animate attributeName="opacity" values="1;0.55;1" dur="1.8s" repeatCount="indefinite"/>
    </circle>

    <text x="410" y="31" text-anchor="middle" fill="#8b949e" font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="13">anubhab@dev-mac - zsh - 80x24</text>

    <!-- Boot body -->
    <g font-family="ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace" font-size="14">

      <text x="22" y="84" fill="#6e7681" opacity="0">
        [boot] initializing session
        <animate attributeName="opacity" values="0;1" dur="0.35s" begin="0.2s" fill="freeze"/>
      </text>

      <text x="248" y="84" fill="#00d4aa" opacity="0">
        <tspan opacity="0">
          .
          <animate attributeName="opacity" values="0;1;0" dur="1.2s" begin="0.6s" repeatCount="indefinite"/>
        </tspan>
        <tspan opacity="0">
          .
          <animate attributeName="opacity" values="0;1;0" dur="1.2s" begin="0.9s" repeatCount="indefinite"/>
        </tspan>
        <tspan opacity="0">
          .
          <animate attributeName="opacity" values="0;1;0" dur="1.2s" begin="1.2s" repeatCount="indefinite"/>
        </tspan>
        <animate attributeName="opacity" values="0;1" dur="0.1s" begin="0.5s" fill="freeze"/>
      </text>

      <text x="22" y="114" fill="#00d4aa" opacity="0">
        $ whoami
        <animate attributeName="opacity" values="0;1" dur="0.25s" begin="1.4s" fill="freeze"/>
      </text>

      <text x="22" y="140" fill="#c9d1d9" opacity="0">
        anubhab_sahoo
        <animate attributeName="opacity" values="0;1" dur="0.25s" begin="2.1s" fill="freeze"/>
      </text>

      <text x="22" y="174" fill="#00d4aa" opacity="0">
        $ cat /sys/class/role
        <animate attributeName="opacity" values="0;1" dur="0.25s" begin="2.8s" fill="freeze"/>
      </text>

      <text x="22" y="200" fill="#c9d1d9" opacity="0">
        backend_developer | ee_student_2026 | ev_infra_builder
        <animate attributeName="opacity" values="0;1" dur="0.35s" begin="3.5s" fill="freeze"/>
      </text>

      <text x="22" y="234" fill="#00d4aa" opacity="0">
        $ systemctl status quest-engine
        <animate attributeName="opacity" values="0;1" dur="0.25s" begin="4.4s" fill="freeze"/>
      </text>

      <text x="22" y="260" fill="#3fb950" opacity="0">
        active (running) quest-engine.service
        <animate attributeName="opacity" values="0;1" dur="0.35s" begin="5.1s" fill="freeze"/>
      </text>

      <rect x="22" y="246" width="10" height="17" fill="#00d4aa" opacity="0">
        <animate attributeName="opacity" values="0;0;1;0;1" keyTimes="0;0.55;0.6;0.8;1" dur="1.1s" begin="5.8s" repeatCount="indefinite"/>
      </rect>
    </g>

    <!-- scan line -->
    <rect x="0" y="50" width="820" height="3" fill="#00d4aa" opacity="0.06">
      <animate attributeName="y" values="50;289;50" dur="7s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
