<svg xmlns="http://www.w3.org/2000/svg" width="820" height="220" viewBox="0 0 820 220" role="img" aria-label="terminal boot sequence">
  <defs>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .dim { fill: #6e7681; }
      .accent { fill: #00d4aa; }
      .text { fill: #c9d1d9; }
      .warn { fill: #f0883e; }
      .ok { fill: #3fb950; }
    </style>
    <clipPath id="frame">
      <rect x="0" y="0" width="820" height="220" rx="0" ry="0"/>
    </clipPath>
  </defs>
  <rect width="820" height="220" fill="#0d1117"/>
  <g clip-path="url(#frame)" class="mono" font-size="14">
    <text x="24" y="36" class="dim">[boot] initializing session...</text>
    <text x="24" y="62" class="accent">$ whoami</text>
    <text x="24" y="86" class="text">anubhab_sahoo</text>
    <text x="24" y="118" class="accent">$ cat /sys/class/role</text>
    <text x="24" y="142" class="text">backend_developer | ee_student_2026 | ev_infra_builder</text>
    <text x="24" y="174" class="accent">$ systemctl status quest-engine</text>
    <text x="24" y="198" class="ok">¤ quest-engine.service  active (running)</text>
    <rect x="24" y="206" width="10" height="16" fill="#00d4aa" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>
